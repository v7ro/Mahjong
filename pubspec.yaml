name: mahjong
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  quiver: ^3.2.1
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/backgrounds/
    - assets/tiles/

  fonts:
    - family: Aboreto
      fonts:
        - asset: assets/fonts/Aboreto-Regular.ttf